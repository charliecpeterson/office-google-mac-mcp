[project]
name = "google-mcp"
version = "0.1.0"
description = "Work live inside open Google Docs/Sheets/Slides from a CLI agent, via the Google Workspace APIs."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=2.3.3",
    "google-api-python-client>=2.0",
    "google-auth-oauthlib>=1.0",
]

[project.scripts]
google-mcp = "google_mcp.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/google_mcp"]
